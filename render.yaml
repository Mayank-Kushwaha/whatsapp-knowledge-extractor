services:
  - type: web
    name: whatsapp-extractor-api
    runtime: python
    rootDir: backend
    # Free tier has no persistent disk. State lives in Turso (DB) and
    # Cloudinary (media files) — both configured via env vars in the Render
    # dashboard, not committed here.
    buildCommand: pip install -r requirements.txt
    # Alembic migrations target the Turso URL when TURSO_DATABASE_URL is set,
    # so they run safely on a stateless filesystem.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_BATCH_SIZE
        value: "64"
      - key: MEDIA_BACKEND
        value: cloudinary
      # Set these in the Render dashboard — do not commit secrets here:
      #   GEMINI_API_KEY
      #   GOOGLE_CLIENT_ID         (matches frontend NextAuth Google client)
      #   FRONTEND_ORIGIN          (your Vercel URL)
      #
      #   TURSO_DATABASE_URL       libsql://<db>-<org>.turso.io  (from `turso db show <name> --url`)
      #   TURSO_AUTH_TOKEN         (from `turso db tokens create <name>`)
      #
      #   CLOUDINARY_CLOUD_NAME    from Cloudinary dashboard
      #   CLOUDINARY_API_KEY
      #   CLOUDINARY_API_SECRET
